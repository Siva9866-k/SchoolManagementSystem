# ============================================================
# School Management System - Application Configuration
# ============================================================

# Application Info
spring.application.name=schoolms
server.port=8098

# ============================================================
# MySQL DataSource Configuration
# Update the values below to match your MySQL environment
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/StudentManagement_Codegnan?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=siva
spring.datasource.password=Siva@8989
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# HikariCP Connection Pool Configuration
# ============================================================
spring.datasource.hikari.pool-name=SchoolMSHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
# 'update' auto-creates/updates tables based on entities.
# Use 'validate' or 'none' in production after initial setup.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# SpringDoc / Swagger UI Configuration
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# Spring Boot Actuator Configuration
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ============================================================
# Logging Configuration
# ============================================================
logging.level.com.codegnan.schoolms=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Console log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File-based logging
logging.file.name=logs/schoolms.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Jackson JSON Configuration
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
