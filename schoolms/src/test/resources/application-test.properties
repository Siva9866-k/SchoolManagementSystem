# ============================================================
# School Management System - Test Profile Configuration
# Uses H2 in-memory database instead of MySQL
# ============================================================

# H2 in-memory datasource (MySQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:schoolms_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 console (useful for debugging tests)
spring.h2.console.enabled=false

# JPA / Hibernate — recreate schema for each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Swagger UI in tests
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Reduce log noise during tests
logging.level.com.codegnan.schoolms=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
